name: linkedin-shortcut
base: core24
version: '3.0-ipc'
summary: A strictly confined LinkedIn shortcut daemon.
description: |
  Uses a Client/Server IPC architecture to bridge hardware events
  to the user's graphical session cleanly.

grade: stable
confinement: strict

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  daemon:
    command: bin/run-daemon.sh
    daemon: simple
    restart-condition: always
    plugs:
      - raw-input
  agent:
    command: bin/run-agent.sh
    autostart: linkedin-shortcut.desktop
    plugs:
      - desktop
  setup:
    command: bin/setup.sh

parts:
  build-c-binaries:
    plugin: make
    source: .
